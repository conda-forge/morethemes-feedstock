context:
  name: morethemes
  version: "0.7.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: bbf2973334e2c936f3b6e3420df2116071346520f62efdb366e8950dae204411

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - matplotlib-base >=3.6.0, <4.0
    - pyfonts >=1.4.1

tests:
  - python:
      imports:
        - morethemes
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://y-sunflower.github.io/morethemes/
  repository: https://github.com/y-sunflower/morethemes
  summary: 'More themes for matplotlib'
  description: |
    morethemes provides themes for matplotlib. More themes, better plots, one line of code.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - claudiushaag
    - JosephBARBIERDARNAL
